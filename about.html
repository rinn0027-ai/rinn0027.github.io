<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — li27n</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,200;0,300;0,400;1,200&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --white:#fafaf8; --black:#111; --gray:#888; --light:#e8e8e4; --serif:'DM Serif Display',serif; --sans:'Jost',sans-serif; }
html { scroll-behavior:smooth; }
body { background:var(--white); color:var(--black); font-family:var(--sans); font-weight:300; overflow-x:hidden; cursor:crosshair; }
nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:0 2.4rem; height:52px; background:var(--white); border-bottom:1px solid var(--light); }
.nav-logo { font-family:var(--sans); font-weight:200; font-size:.8rem; letter-spacing:.22em; text-transform:uppercase; color:var(--black); text-decoration:none; }
.nav-links { display:flex; gap:2.4rem; list-style:none; }
.nav-links a { font-family:var(--sans); font-weight:300; font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gray); text-decoration:none; transition:color .2s; }
.nav-links a:hover, .nav-links a.active { color:var(--black); }
.rv { opacity:0; transform:translateY(18px); transition:opacity .75s ease, transform .75s ease; }
.rv.on { opacity:1; transform:none; }
footer { padding:1.4rem 2.4rem; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--light); margin-top:4rem; }
footer span { font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); }
.footer-links { display:flex; gap:1.8rem; align-items:center; }
.footer-links a { font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); text-decoration:none; transition:opacity .2s; }
.footer-links a:hover { opacity:.45; }
.footer-links a svg { width:13px; height:13px; vertical-align:middle; margin-right:.3rem; }
</style>
<style>
.page-header { margin-top:52px; padding:3.5rem 2.4rem 2rem; border-bottom:1px solid var(--light); }
.page-header h1 { font-family:var(--serif); font-style:italic; font-size:clamp(2rem,4vw,3.5rem); font-weight:400; }

.about-body { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--light); }
.about-img { overflow:hidden; max-height:85vh; }
.about-img img { width:100%; height:100%; object-fit:cover; display:block; }
.about-text { padding:4rem 3rem; display:flex; flex-direction:column; justify-content:space-between; }
.about-text h2 { font-family:var(--serif); font-style:italic; font-size:clamp(1.4rem,2.5vw,2rem); font-weight:400; line-height:1.3; margin-bottom:2rem; }
.about-text p { font-size:1rem; line-height:1.9; color:var(--black); margin-bottom:1.2rem; }
.about-text p.muted { color:var(--gray); font-size:.9rem; }

.facts-strip { display:grid; grid-template-columns:repeat(3,1fr); border-bottom:1px solid var(--light); }
.fact { padding:2.4rem 2.4rem; border-right:1px solid var(--light); }
.fact:last-child { border-right:none; }
.fact-label { font-size:.55rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gray); margin-bottom:.7rem; display:block; }
.fact-value { font-family:var(--serif); font-style:italic; font-size:1.2rem; line-height:1.5; }

.accent-img { border-bottom:1px solid var(--light); overflow:hidden; }
.accent-img img { width:100%; max-height:55vh; object-fit:cover; display:block; transition:transform 1.2s cubic-bezier(.25,.46,.45,.94); }
.accent-img:hover img { transform:scale(1.03); }

.contact-strip { padding:3.5rem 2.4rem; border-bottom:1px solid var(--light); display:grid; grid-template-columns:1fr 1fr; gap:2rem; align-items:center; }
.contact-strip h3 { font-family:var(--serif); font-style:italic; font-size:clamp(1.3rem,2.5vw,2rem); font-weight:400; }
.contact-links { display:flex; flex-direction:column; gap:.9rem; }
.contact-links a { display:flex; align-items:center; gap:.6rem; font-size:.8rem; letter-spacing:.06em; color:var(--black); text-decoration:none; transition:opacity .2s; }
.contact-links a:hover { opacity:.45; }
.contact-links a svg { width:15px; height:15px; flex-shrink:0; }
.contact-links .note { font-size:.65rem; color:var(--gray); letter-spacing:.1em; }
</style>
<style>
.nav-right { display:flex; align-items:center; }
.lang-switch { display:flex; gap:.3rem; border-left:1px solid var(--light); padding-left:1.2rem; margin-left:1.6rem; }
.lang-btn { font-family:var(--sans); font-size:.58rem; letter-spacing:.08em; text-transform:uppercase; background:none; border:none; color:var(--gray); cursor:pointer; padding:3px 4px; transition:color .2s; line-height:1; }
.lang-btn.active { color:var(--black); border-bottom:1px solid var(--black); padding-bottom:2px; }
.lang-btn:hover { color:var(--black); }
</style>
<style>
@media(max-width:640px){
  nav{padding:0 1.2rem;}
  .nav-links{gap:1.2rem;}
  .nav-links li:nth-child(n+3){display:none;}
  .lang-switch{margin-left:.6rem;padding-left:.7rem;}
  .lang-btn{padding:3px 3px;}

  /* About page mobile layout */
  .page-header{padding:2rem 1.4rem 1.2rem;}
  .about-body{grid-template-columns:1fr;}
  .about-img{max-height:70vw;}
  .about-text{padding:2rem 1.4rem;}
  .facts-strip{grid-template-columns:1fr;}
  .fact{border-right:none;border-bottom:1px solid var(--light);}
  .fact:last-child{border-bottom:none;}
  .contact-strip{grid-template-columns:1fr;padding:2.5rem 1.4rem;}
}
.name-label { font-family:var(--sans); font-weight:200; font-size:.75rem; letter-spacing:.22em; text-transform:uppercase; color:var(--gray); margin-bottom:1rem; margin-top:-.4rem; }
</style>
